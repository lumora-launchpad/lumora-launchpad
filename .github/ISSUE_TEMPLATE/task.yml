name: Task or feature
description: A structured piece of work ready to be picked up by Claude
title: "[Task]: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Fill in each section as clearly as you can. The clearer the context and criteria, the better the result.
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Background and current state
      placeholder: Explain how things work today and why this is needed
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: The desired outcome in one or two sentences
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Concrete numbered steps
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: criteria
    attributes:
      label: Done criteria
      description: Checklist that must be met before this is considered complete
      value: |
        * [ ]
        * [ ]
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Related files
      description: Paths likely to be touched
      placeholder: web/app/..., web/lib/..., contracts/src/...
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        Once the issue is created and the Claude GitHub App is active, comment on this issue mentioning Claude to start the work.
