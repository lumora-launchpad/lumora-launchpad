name: Bug report
description: Report incorrect behavior in the contracts or the web app
title: "[Bug]: "
labels: []
body:
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What is wrong, as clearly as possible
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: chain (Base Sepolia or mainnet), browser, wallet
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        Once the issue is created and the Claude GitHub App is active, comment on this issue mentioning Claude if you want Claude to fix it.
