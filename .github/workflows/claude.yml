# Claude Code GitHub Action
#
# Lets Claude work automatically in this repo. Mention @claude inside an issue,
# a PR comment, or a PR review, and Claude will write code then open a PR.
#
# Authentication uses the CLAUDE_CODE_OAUTH_TOKEN secret installed automatically
# by /install-github-app (using a Claude subscription, not a paid API key).
# To use an Anthropic API key instead, change the with line below to:
# anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Hanya jalan kalau ada mention @claude.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
