# Claude Code GitHub Action
#
# Membuat Claude bekerja otomatis di repo ini. Sebut @claude di dalam issue,
# komentar PR, atau review PR, dan Claude akan menulis kode lalu membuka PR.
#
# Sebelum jalan, siapkan satu hal di repo:
#   Settings > Secrets and variables > Actions > New repository secret
#   Nama   : ANTHROPIC_API_KEY
#   Nilai  : API key dari https://console.anthropic.com
#
# Cara termudah memasang semuanya sekaligus adalah menjalankan /install-github-app
# di Claude Code, yang juga akan menjaga workflow ini tetap versi terbaru.

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Hanya jalan kalau ada mention @claude.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
